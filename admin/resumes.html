<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Tailored Resumes — Admin</title>
<link rel="icon" type="image/x-icon" href="../img/icon_blue.png">
<style>
  :root {
    --primary: #0f172a; --accent: #0e7490; --accent-light: #e0f2fe;
    --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --bg: #f1f5f9; --card: #ffffff;
  }
  [data-theme="dark"] {
    --primary: #0f172a; --accent: #22d3ee; --accent-light: #164e63;
    --text: #e2e8f0; --muted: #94a3b8; --border: #334155; --bg: #020617; --card: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 20px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  h1 { font-size: 20px; }
  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--accent); }
  .empty { color: var(--muted); font-size: 14px; padding: 40px 0; text-align: center; }
  .row {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 12px; display: flex; justify-content: space-between;
    align-items: center; gap: 16px;
  }
  .row-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .row-desc { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
  .row-meta { color: var(--muted); font-size: 11.5px; }
  .download-btn {
    flex-shrink: 0; background: var(--accent); color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .download-btn:hover { opacity: 0.9; }
  .download-btn:disabled { opacity: 0.6; cursor: wait; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header-row">
      <h1>Tailored Resumes</h1>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (!saved && prefersDark)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    if (sessionStorage.getItem("admin_authed") !== "1") {
      window.location.href = "index.html";
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
  <script src="../js/resume-pdf.js"></script>

  <script>
    document.getElementById("logoutBtn").addEventListener("click", function () {
      sessionStorage.removeItem("admin_authed");
      window.location.href = "index.html";
    });

    function slugToFilename(entry) {
      return (entry.title || entry.id).replace(/[^a-z0-9]+/gi, "_") + "_Resume.pdf";
    }

    async function loadResumes() {
      const listEl = document.getElementById("list");
      try {
        const res = await fetch("../resume/tailored/manifest.json", { cache: "no-store" });
        const entries = await res.json();

        if (!entries || !entries.length) {
          listEl.innerHTML = '<div class="empty">No tailored resumes yet. Run the tailor-resume skill to add one.</div>';
          return;
        }

        listEl.innerHTML = "";
        entries.slice().sort((a, b) => (b.date || "").localeCompare(a.date || "")).forEach(entry => {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <div>
              <div class="row-title">${entry.title}</div>
              <div class="row-desc">${entry.description || ""}</div>
              <div class="row-meta">${entry.date ? "Generated: " + entry.date : ""}</div>
            </div>
            <button class="download-btn">Download</button>
          `;
          row.querySelector(".download-btn").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            btn.disabled = true;
            btn.textContent = "Preparing…";
            try {
              const dataRes = await fetch("../" + entry.dataFile, { cache: "no-store" });
              const aboutData = await dataRes.json();
              generateResumePdf(aboutData, slugToFilename(entry));
            } catch (err) {
              alert("Could not load resume data for this entry.");
            } finally {
              btn.disabled = false;
              btn.textContent = "Download";
            }
          });
          listEl.appendChild(row);
        });
      } catch (err) {
        listEl.innerHTML = '<div class="empty">Could not load the resume list.</div>';
      }
    }

    loadResumes();
  </script>
</body>
</html>
